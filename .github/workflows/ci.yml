name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Test and Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install CGO toolchain
        run: sudo apt-get update && sudo apt-get install -y build-essential

      - name: Download dependencies
        run: go mod download

      - name: Run tests
        run: |
          go test ./...
          sh test/install_script_test.sh
          sh test/release_assets_test.sh
          sh test/llm_provider_example_test.sh
          sh test/verify_client_setup_test.sh
          sh test/mcp_process_smoke_test.sh
          sh test/mcp_client_demo_test.sh
          sh test/agent_decision_demo_test.sh
          sh test/showcase_scripts_test.sh
          sh test/showcase_summary_test.sh
          sh test/verification_report_test.sh
          sh test/docs_links_test.sh
          sh test/docs_json_examples_test.sh
          sh test/release_doc_index_test.sh
          sh test/fixtures_index_test.sh
          sh test/fixture_decision_mapping_test.sh
          sh test/client_integration_doc_test.sh

      - name: Build server
        run: go build -o /tmp/testloop-mcp .

      - name: Build testgen CLI
        run: go build -o /tmp/testloop-testgen ./cmd/testgen

      - name: Build Docker image
        run: docker build -t testloop-mcp:ci .
