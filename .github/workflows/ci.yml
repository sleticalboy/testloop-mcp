name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Test and Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install CGO toolchain
        run: sudo apt-get update && sudo apt-get install -y build-essential

      - name: Download dependencies
        run: go mod download

      - name: Run tests
        run: |
          go test ./...
          sh test/install_script_test.sh
          sh test/release_assets_test.sh
          sh test/llm_provider_example_test.sh
          sh test/verify_client_setup_test.sh
          sh test/mcp_process_smoke_test.sh
          sh test/mcp_client_demo_test.sh
          sh test/doctor_first_run_test.sh
          sh test/agent_decision_demo_test.sh
          sh test/verification_summary_decision_demo_test.sh
          sh test/verification_summary_failure_fixtures_test.sh
          sh test/run_first_run_ci_test.sh
          sh test/run_onboarding_ci_test.sh
          sh test/first_run_agent_response_demo_test.sh
          sh test/onboarding_agent_response_demo_test.sh
          sh test/render_first_run_agent_response_test.sh
          sh test/first_run_artifact_fixtures_test.sh
          sh test/onboarding_artifact_fixtures_test.sh
          sh test/agent_artifact_verify_test.sh
          sh test/first_run_failure_fixtures_test.sh
          sh test/agent_response_artifact_manifest_test.sh
          sh test/agent_response_manifest_demo_test.sh
          sh test/onboarding_ci_failure_triage_doc_test.sh
          sh test/ci_agent_triage_doc_test.sh
          sh test/showcase_agent_onboarding_report_test.sh
          sh test/showcase_scripts_test.sh
          sh test/showcase_summary_test.sh
          sh test/verification_report_test.sh
          sh test/quickstart_doc_test.sh
          sh test/installation_doc_test.sh
          sh test/adopter_verification_guide_doc_test.sh
          sh test/first_run_agent_response_doc_test.sh
          sh test/first_run_ci_template_doc_test.sh
          sh test/first_run_ci_template_yaml_test.sh
          sh test/first_run_ci_external_dry_run_doc_test.sh
          sh test/real_integration_cases_doc_test.sh
          sh test/readme_ci_snippet_test.sh
          sh test/onboarding_ci_template_doc_test.sh
          sh test/onboarding_ci_template_yaml_test.sh
          sh test/onboarding_ci_external_dry_run_doc_test.sh
          sh test/docs_links_test.sh
          sh test/docs_json_examples_test.sh
          sh test/go_cli_duplicate_name_smoke_test.sh
          sh test/java_regression_fixture_test.sh
          sh test/js_regression_fixture_test.sh
          sh test/js_ts_barrel_cli_smoke_test.sh
          sh test/py_regression_fixture_test.sh
          sh test/fixture_task_jsonl_script_test.sh
          sh test/regression_preflight_test.sh
          sh test/regression_preflight_report_test.sh
          sh test/regression_smoke_test.sh
          sh test/regression_samples_test.sh
          sh test/validate_coverage_top_tasks_output_test.sh
          sh test/repository_hygiene_test.sh
          sh test/release_candidate_script_test.sh
          sh test/release_workflow_test.sh
          sh test/release_doc_index_test.sh
          sh test/agent_decision_fixtures_manifest_test.sh
          sh test/agent_decision_fixture_validator_test.sh
          sh test/agent_decision_fixture_export_test.sh
          sh test/agent_decision_client_ci_showcase_test.sh
          sh test/agent_decision_client_ci_response_test.sh
          sh test/install_agent_decision_client_ci_template_test.sh
          sh test/agent_decision_client_ci_template_install_showcase_test.sh
          sh test/agent_decision_client_ci_template_install_summary_schema_test.sh
          sh test/agent_decision_client_ci_install_summary_validator_test.sh
          sh test/agent_decision_client_ci_consumer_smoke_test.sh
          sh test/agent_decision_client_ci_consumer_smoke_summary_schema_test.sh
          sh test/agent_decision_client_ci_consumer_smoke_summary_validator_test.sh
          sh test/agent_decision_client_consumer_response_test.sh
          sh test/agent_decision_client_release_smoke_test.sh
          sh test/agent_decision_client_release_response_test.sh
          sh test/agent_decision_client_release_response_smoke_test.sh
          sh test/agent_decision_release_response_client_doc_test.sh
          sh test/agent_decision_client_ci_checklist_doc_test.sh
          sh test/agent_decision_client_ci_checklist_commands_test.sh
          sh test/agent_decision_client_ci_template_doc_test.sh
          sh test/agent_decision_client_ci_template_yaml_test.sh
          sh test/agent_decision_client_ci_template_dry_run_test.sh
          sh test/fixtures_index_test.sh
          sh test/fixture_decision_mapping_test.sh
          sh test/run_tests_fixture_index_test.sh
          sh test/client_integration_doc_test.sh
          sh test/mcp_client_contract_doc_test.sh
          sh test/agent_response_artifact_contract_doc_test.sh
          sh test/verification_ci_doc_test.sh
          sh test/ci_workflow_test.sh

      - name: Build server
        run: go build -o /tmp/testloop-mcp .

      - name: Build testgen CLI
        run: go build -o /tmp/testloop-testgen ./cmd/testgen

      - name: Build Docker image
        run: docker build -t testloop-mcp:ci .
