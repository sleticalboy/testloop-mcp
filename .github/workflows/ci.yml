name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Test and Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install CGO toolchain
        run: sudo apt-get update && sudo apt-get install -y build-essential

      - name: Download dependencies
        run: go mod download

      - name: Run tests
        run: go test ./...

      - name: Build server
        run: go build -o /tmp/testloop-mcp .

      - name: Build testgen CLI
        run: go build -o /tmp/testloop-testgen ./cmd/testgen

      - name: Build Docker image
        run: docker build -t testloop-mcp:ci .
