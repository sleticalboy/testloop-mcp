name: Release Artifacts

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to build, for example v0.4.1"
        required: true

permissions:
  contents: write

jobs:
  linux-amd64:
    name: Build Linux amd64 artifacts
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release tag
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            tag="${{ inputs.tag }}"
            git fetch --tags --force origin
            git checkout "$tag"
          fi
          echo "TAG_NAME=$tag" >> "$GITHUB_ENV"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install CGO toolchain
        run: sudo apt-get update && sudo apt-get install -y build-essential

      - name: Download dependencies
        run: go mod download

      - name: Build binaries
        run: |
          set -euo pipefail
          mkdir -p dist/package
          CGO_ENABLED=1 GOOS=linux GOARCH=amd64 go build -trimpath -ldflags="-s -w" -o dist/package/testloop-mcp .
          CGO_ENABLED=1 GOOS=linux GOARCH=amd64 go build -trimpath -ldflags="-s -w" -o dist/package/testloop-testgen ./cmd/testgen
          cp README.md LICENSE dist/package/
          tar -czf "dist/testloop-mcp_${TAG_NAME}_linux_amd64.tar.gz" -C dist/package .
          rm -rf dist/package

      - name: Generate checksums
        run: |
          set -euo pipefail
          cd dist
          sha256sum *.tar.gz > checksums.txt

      - name: Ensure GitHub Release exists
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if ! gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release create "$TAG_NAME" --title "testloop-mcp ${TAG_NAME}" --generate-notes
          fi

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "$TAG_NAME" dist/*.tar.gz dist/checksums.txt --clobber
