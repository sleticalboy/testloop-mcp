name: Release Artifacts

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to build, for example v0.4.1"
        required: true

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.asset }}
    runs-on: ${{ matrix.runner }}
    env:
      GH_REPO: ${{ github.repository }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - asset: linux_amd64
            runner: ubuntu-latest
            goos: linux
            goarch: amd64
          - asset: linux_arm64
            runner: ubuntu-24.04-arm
            goos: linux
            goarch: arm64
          - asset: darwin_arm64
            runner: macos-26
            goos: darwin
            goarch: arm64
          - asset: windows_amd64
            runner: windows-latest
            goos: windows
            goarch: amd64

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release tag
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            tag="${{ inputs.tag }}"
            git fetch --tags --force origin
            git checkout "$tag"
          fi
          mkdir -p .release
          if git cat-file -e "${GITHUB_SHA}:scripts/package-release-asset.sh" 2>/dev/null; then
            git show "${GITHUB_SHA}:scripts/package-release-asset.sh" > .release/package-release-asset.sh
          else
            cp scripts/package-release-asset.sh .release/package-release-asset.sh
          fi
          chmod +x .release/package-release-asset.sh
          echo "TAG_NAME=$tag" >> "$GITHUB_ENV"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install CGO toolchain
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y build-essential

      - name: Set up MSYS2
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          path-type: inherit
          update: true
          install: >-
            base-devel
            git
            mingw-w64-ucrt-x86_64-gcc
            zip

      - name: Download dependencies
        if: runner.os != 'Windows'
        run: go mod download

      - name: Download dependencies
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: go mod download

      - name: Build binaries
        if: runner.os != 'Windows'
        run: |
          set -euo pipefail
          .release/package-release-asset.sh "$TAG_NAME" "${{ matrix.asset }}" "${{ matrix.goos }}" "${{ matrix.goarch }}"

      - name: Build binaries
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: |
          set -euo pipefail
          .release/package-release-asset.sh "$TAG_NAME" "${{ matrix.asset }}" "${{ matrix.goos }}" "${{ matrix.goarch }}"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.asset }}
          path: |
            dist/*.tar.gz
            dist/*.zip
            dist/*.sha256
          if-no-files-found: error

      - name: Ensure GitHub Release exists
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if ! gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release create "$TAG_NAME" --title "testloop-mcp ${TAG_NAME}" --generate-notes || gh release view "$TAG_NAME" >/dev/null
          fi

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "$TAG_NAME" dist/*.tar.gz dist/*.zip dist/*.sha256 --clobber
