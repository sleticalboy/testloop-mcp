name: Release Artifacts

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to build, for example v0.4.1"
        required: true

permissions:
  contents: write

env:
  HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}

jobs:
  build:
    name: Build ${{ matrix.asset }}
    runs-on: ${{ matrix.runner }}
    env:
      GH_REPO: ${{ github.repository }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - asset: linux_amd64
            runner: ubuntu-latest
            goos: linux
            goarch: amd64
          - asset: linux_arm64
            runner: ubuntu-24.04-arm
            goos: linux
            goarch: arm64
          - asset: darwin_arm64
            runner: macos-26
            goos: darwin
            goarch: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release tag
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            tag="${{ inputs.tag }}"
            git fetch --tags --force origin
            git checkout "$tag"
          fi
          echo "TAG_NAME=$tag" >> "$GITHUB_ENV"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install CGO toolchain
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y build-essential

      - name: Download dependencies
        run: go mod download

      - name: Build binaries
        run: |
          set -euo pipefail
          archive="testloop-mcp_${TAG_NAME}_${{ matrix.asset }}.tar.gz"
          mkdir -p dist/package
          CGO_ENABLED=1 GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} go build -trimpath -ldflags="-s -w" -o dist/package/testloop-mcp .
          CGO_ENABLED=1 GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} go build -trimpath -ldflags="-s -w" -o dist/package/testloop-testgen ./cmd/testgen
          cp README.md LICENSE dist/package/
          tar -czf "dist/${archive}" -C dist/package .
          rm -rf dist/package
          cd dist
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "$archive" > "${archive}.sha256"
          else
            shasum -a 256 "$archive" > "${archive}.sha256"
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.asset }}
          path: |
            dist/*.tar.gz
            dist/*.sha256
          if-no-files-found: error

      - name: Ensure GitHub Release exists
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if ! gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release create "$TAG_NAME" --title "testloop-mcp ${TAG_NAME}" --generate-notes || gh release view "$TAG_NAME" >/dev/null
          fi

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "$TAG_NAME" dist/*.tar.gz dist/*.sha256 --clobber

  homebrew-tap-pr:
    name: Update Homebrew tap
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        if: ${{ env.HOMEBREW_TAP_TOKEN != '' }}
        uses: actions/checkout@v4

      - name: Resolve release tag
        if: ${{ env.HOMEBREW_TAP_TOKEN != '' }}
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            tag="${{ inputs.tag }}"
          fi
          echo "TAG_NAME=$tag" >> "$GITHUB_ENV"

      - name: Checkout Homebrew tap
        if: ${{ env.HOMEBREW_TAP_TOKEN != '' }}
        uses: actions/checkout@v4
        with:
          repository: sleticalboy/homebrew-tap
          token: ${{ env.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Update Homebrew formula
        if: ${{ env.HOMEBREW_TAP_TOKEN != '' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          branch="update-testloop-mcp-${TAG_NAME}"
          git -C homebrew-tap checkout -B "$branch"
          TESTLOOP_MCP_REPO="${{ github.repository }}" scripts/update-homebrew-tap.sh "$TAG_NAME" homebrew-tap

      - name: Create Homebrew tap pull request
        if: ${{ env.HOMEBREW_TAP_TOKEN != '' }}
        env:
          GH_TOKEN: ${{ env.HOMEBREW_TAP_TOKEN }}
        run: |
          set -euo pipefail
          cd homebrew-tap
          if git diff --quiet -- Formula/testloop-mcp.rb; then
            echo "Formula is already up to date."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/testloop-mcp.rb
          git commit -m "Update testloop-mcp to ${TAG_NAME}"
          git push --force-with-lease origin "update-testloop-mcp-${TAG_NAME}"
          gh pr view "update-testloop-mcp-${TAG_NAME}" --repo sleticalboy/homebrew-tap >/dev/null 2>&1 || \
            gh pr create \
              --repo sleticalboy/homebrew-tap \
              --base main \
              --head "update-testloop-mcp-${TAG_NAME}" \
              --title "Update testloop-mcp to ${TAG_NAME}" \
              --body "Update testloop-mcp Homebrew formula for ${TAG_NAME}."

      - name: Skip Homebrew tap update
        if: ${{ env.HOMEBREW_TAP_TOKEN == '' }}
        run: echo "HOMEBREW_TAP_TOKEN is not configured; skipping Homebrew tap PR."
