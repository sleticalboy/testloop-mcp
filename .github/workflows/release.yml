name: Release Artifacts

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to build, for example v0.4.1"
        required: true

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.asset }}
    runs-on: ${{ matrix.runner }}
    env:
      GH_REPO: ${{ github.repository }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - asset: linux_amd64
            runner: ubuntu-latest
            goos: linux
            goarch: amd64
          - asset: linux_arm64
            runner: ubuntu-24.04-arm
            goos: linux
            goarch: arm64
          - asset: darwin_arm64
            runner: macos-26
            goos: darwin
            goarch: arm64
          - asset: windows_amd64
            runner: windows-latest
            goos: windows
            goarch: amd64
            msystem: UCRT64
            cgo_package: mingw-w64-ucrt-x86_64-gcc
            cc: gcc
            cxx: g++
          - asset: windows_arm64
            runner: windows-11-arm
            goos: windows
            goarch: arm64
            msystem: CLANGARM64
            cgo_package: mingw-w64-clang-aarch64-clang
            cc: clang
            cxx: clang++

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Resolve release tag
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            tag="${{ inputs.tag }}"
            git fetch --tags --force origin
            git checkout "$tag"
          fi
          mkdir -p .release
          if git cat-file -e "${GITHUB_SHA}:scripts/package-release-asset.sh" 2>/dev/null; then
            git show "${GITHUB_SHA}:scripts/package-release-asset.sh" > .release/package-release-asset.sh
          else
            cp scripts/package-release-asset.sh .release/package-release-asset.sh
          fi
          chmod +x .release/package-release-asset.sh
          echo "TAG_NAME=$tag" >> "$GITHUB_ENV"

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install CGO toolchain
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y build-essential

      - name: Set up MSYS2
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: ${{ matrix.msystem }}
          path-type: inherit
          update: true
          install: >-
            base-devel
            git
            ${{ matrix.cgo_package }}
            unzip
            zip

      - name: Download dependencies
        if: runner.os != 'Windows'
        run: go mod download

      - name: Download dependencies
        if: runner.os == 'Windows'
        shell: msys2 {0}
        env:
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}
        run: go mod download

      - name: Build binaries
        if: runner.os != 'Windows'
        run: |
          set -euo pipefail
          .release/package-release-asset.sh "$TAG_NAME" "${{ matrix.asset }}" "${{ matrix.goos }}" "${{ matrix.goarch }}"

      - name: Build binaries
        if: runner.os == 'Windows'
        shell: msys2 {0}
        env:
          CGO_ENABLED: "1"
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}
        run: |
          set -euo pipefail
          .release/package-release-asset.sh "$TAG_NAME" "${{ matrix.asset }}" "${{ matrix.goos }}" "${{ matrix.goarch }}"

      - name: Verify release asset
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          archive="testloop-mcp_${TAG_NAME}_${{ matrix.asset }}.tar.gz"
          cd dist
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum -c "${archive}.sha256"
          else
            shasum -a 256 -c "${archive}.sha256"
          fi
          tar -tzf "$archive" | sed 's#^\./##' | sort > contents.txt
          grep -Fx LICENSE contents.txt
          grep -Fx README.md contents.txt
          grep -Fx testloop-mcp contents.txt
          grep -Fx testloop-testgen contents.txt

      - name: Verify release asset
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: |
          set -euo pipefail
          archive="testloop-mcp_${TAG_NAME}_${{ matrix.asset }}.zip"
          cd dist
          sha256sum -c "${archive}.sha256"
          unzip -Z1 "$archive" | sort > contents.txt
          grep -Fx LICENSE contents.txt
          grep -Fx README.md contents.txt
          grep -Fx testloop-mcp.exe contents.txt
          grep -Fx testloop-testgen.exe contents.txt
          rm -rf unpack
          mkdir unpack
          unzip -q "$archive" -d unpack
          set +e
          ./unpack/testloop-mcp.exe --help > mcp-help.txt 2>&1
          mcp_status=$?
          ./unpack/testloop-testgen.exe --help > testgen-help.txt 2>&1
          testgen_status=$?
          set -e
          test "$mcp_status" -eq 0
          test "$testgen_status" -eq 0
          grep -F "Usage of testloop-mcp" mcp-help.txt
          grep -F "Usage: testgen" testgen-help.txt

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: release-${{ matrix.asset }}
          path: |
            dist/*.tar.gz
            dist/*.zip
            dist/*.sha256
          if-no-files-found: error

      - name: Ensure GitHub Release exists
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          retry() {
            local attempt
            for attempt in 1 2 3 4 5; do
              if "$@"; then
                return 0
              fi
              sleep $((attempt * 5))
            done
            "$@"
          }
          if ! retry gh release view "$TAG_NAME" >/dev/null; then
            retry gh release create "$TAG_NAME" --title "testloop-mcp ${TAG_NAME}" --generate-notes
          fi

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          retry() {
            local attempt
            for attempt in 1 2 3 4 5; do
              if "$@"; then
                return 0
              fi
              sleep $((attempt * 5))
            done
            "$@"
          }
          shopt -s nullglob
          files=(dist/*.tar.gz dist/*.zip dist/*.sha256)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "no release assets found" >&2
            exit 1
          fi
          for file in "${files[@]}"; do
            retry gh release upload "$TAG_NAME" "$file" --clobber
          done
